<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betriebspass – Ihr digitales Betriebshandbuch</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;color:#222;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;font-size:14px}
/* TOP BAR */
#bar{background:#1a3a5c;padding:0 16px;height:54px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;border-bottom:3px solid #2a6090}
#logo{display:flex;flex-direction:column;flex:1}
#logo span:first-child{color:#fff;font-size:16px;font-weight:900;letter-spacing:2px}
#logo span:last-child{color:#7ab3d4;font-size:9px;letter-spacing:3px;text-transform:uppercase}
.tb{background:none;border:1px solid #2a6090;color:#7ab3d4;padding:6px 12px;font-size:11px;text-transform:uppercase;cursor:pointer;letter-spacing:1px;border-radius:3px}
.tb.r{background:#2a6090;border-color:#2a6090;color:#fff;font-weight:600}
/* LAYOUT */
#wrap{display:block;width:100%}
#nav{display:inline-block;vertical-align:top;width:190px;background:#0f2840;min-height:calc(100vh - 54px)}
#main{display:inline-block;vertical-align:top;width:calc(100% - 194px);padding:20px;background:#f5f5f5;min-height:calc(100vh - 54px)}
/* NAV */
.ng{padding:12px 0 4px}
.ngl{font-size:9px;color:#3a6080;letter-spacing:2px;text-transform:uppercase;padding:0 14px 5px;display:block}
.nb{display:block;width:100%;background:none;border:none;border-left:3px solid transparent;padding:10px 14px;text-align:left;color:#7ab3d4;font-size:13px;cursor:pointer;-webkit-tap-highlight-color:rgba(42,96,144,.3)}
.nb.on{color:#fff;border-left-color:#2a6090;background:rgba(42,96,144,.25)}
.nb:active{background:rgba(255,255,255,.05)}
/* CONTENT */
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #e0e0e0;gap:10px;flex-wrap:wrap}
.pt{font-size:20px;font-weight:900;color:#1a3a5c;letter-spacing:1px}
.abtn{background:#1a3a5c;border:none;color:#fff;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;border-radius:3px;letter-spacing:1px}
.abtn:active{background:#2a6090}
/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.card{background:#fff;border:1px solid #e0e0e0;border-left:3px solid #2a6090;border-radius:4px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.chd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px;gap:6px}
.ct{font-size:13px;font-weight:700;color:#1a3a5c;word-break:break-word}
.ca{display:flex;align-items:center;gap:2px;flex-shrink:0}
.ib{background:none;border:none;color:#aaa;font-size:14px;padding:3px 6px;cursor:pointer;border-radius:3px}
.ib:active{background:#f0f0f0}
.cf{display:flex;gap:8px;margin-bottom:3px;font-size:12px;line-height:1.4}
.cl{color:#999;min-width:90px;flex-shrink:0}
.cv{color:#333;word-break:break-word}
.bdg{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;margin-left:4px}
.bg{background:#e8f5e9;color:#2e7d32}.bo{background:#fff3e0;color:#e65100}.br{background:#fdecea;color:#c62828}.bx{background:#f5f5f5;color:#666}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:20px}
.sc{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.sn{font-size:32px;font-weight:900;color:#1a3a5c}
.sl{font-size:9px;color:#999;margin-top:2px;text-transform:uppercase;letter-spacing:1px}
.ntc{background:#e8f0f8;border-left:3px solid #2a6090;padding:10px 14px;font-size:12px;color:#1a3a5c;margin-bottom:14px;border-radius:0 4px 4px 0}
.ntcr{background:#fdecea;border-left:3px solid #c0392b;padding:10px 14px;font-size:12px;color:#7a1a1a;margin-bottom:14px;border-radius:0 4px 4px 0}
.sbar{position:relative;margin-bottom:12px}
.sbar input{width:100%;background:#fff;border:1px solid #ddd;color:#222;padding:9px 12px 9px 32px;font-size:13px;outline:none;border-radius:4px}
.sbar input:focus{border-color:#2a6090;box-shadow:0 0 0 2px rgba(42,96,144,.15)}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none}
.empty{text-align:center;padding:32px;color:#bbb;border:2px dashed #e0e0e0;border-radius:6px;font-size:13px;background:#fff}
/* MODAL */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:16px}
#ov.show{display:flex}
#mod{background:#fff;border-radius:8px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.mt{font-size:17px;font-weight:900;color:#1a3a5c;margin-bottom:16px}
.fr{margin-bottom:11px}
.fl{display:block;font-size:10px;color:#999;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;font-weight:600}
input[type=text],input[type=date],textarea,select{width:100%;background:#f8f8f8;border:1px solid #ddd;color:#222;font-size:13px;padding:9px 11px;outline:none;border-radius:4px;font-family:inherit;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:#2a6090;background:#fff;box-shadow:0 0 0 2px rgba(42,96,144,.15)}
textarea{resize:vertical;min-height:65px}
select option{background:#fff}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid #eee}
/* SETTINGS */
.sf{background:#fff;border:1px solid #e0e0e0;border-radius:6px;padding:18px;max-width:460px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.dz{border:2px solid #fdecea;border-radius:6px;padding:14px;max-width:460px;background:#fffbfb}
.dzt{font-size:10px;color:#c0392b;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;font-weight:700}
.sec-lbl{font-size:10px;color:#999;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;margin-top:16px;font-weight:600}
/* WELCOME BANNER */
.welcome{background:linear-gradient(135deg,#1a3a5c,#0f2840);color:#fff;border-radius:8px;padding:20px 24px;margin-bottom:20px}
.welcome h2{font-size:18px;margin-bottom:6px;letter-spacing:1px}
.welcome p{font-size:12px;color:#7ab3d4;line-height:1.6}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#2a6090;border-radius:2px}
/* PRINT */
@media print{#bar,#nav,#ov,.abtn,.tb,.ib,.sbar{display:none!important}#main{width:100%!important;padding:16px}}
/* PASSWORD SCREEN */
#pwscreen{display:none;position:fixed;inset:0;background:#0f2840;z-index:9999;align-items:center;justify-content:center;flex-direction:column;gap:16px}
</style>
</head>

// ── HELPERS ──────────────────────────────────────────────
function h(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ct(s,x){var m={auftraege:x.titel,kunden:x.name,lieferanten:x.name,inventar:x.bezeichnung,finanzen:x.bezeichnung,vertraege:x.bezeichnung,versicherungen:x.bezeichnung,zugaenge:x.bezeichnung,kontakte:x.name,rechtliches:x.bezeichnung,wissen:x.titel,notizen:x.titel};return m[s]||'?'}
function lsSave(){try{localStorage.setItem('bp_data',JSON.stringify(db))}catch(e){}}
function lsLoad(){try{var d=localStorage.getItem('bp_data');if(d)db=JSON.parse(d)}catch(e){}}
function fmt(v){if(!v)return '';if(v.match&&v.match(/^\d{4}-\d{2}-\d{2}$/)){var p=v.split('-');return p[2]+'.'+p[1]+'.'+p[0]}return v}

// ── CARDS ──────────────────────────────────────────────
function rCards(name,q){
  var cfg=F[name];if(!cfg)return '';
  var a=db[name]||[];
  var ql=q?q.toLowerCase():'';
  var out='';var cnt=0;
  for(var i=0;i<a.length;i++){
    var x=a[i];
    if(ql){
      var hay=JSON.stringify(x).toLowerCase();
      if(hay.indexOf(ql)<0)continue;
    }
    cnt++;
    var rows='';
    for(var j=0;j<cfg.f.length;j++){
      var f=cfg.f[j];
      var v=x[f.k];
      if(!v)continue;
      var bdg='';
      if(f.tp==='sel'){
        var cls='bx';
        if(v==='Offen'||v==='Hoch'||v==='Kritisch'||v==='Kritisch \u2013 sofort wissen'||v==='Zuerst anrufen'||v==='Unverzichtbar')cls='br';
        else if(v==='In Arbeit'||v==='Wichtig'||v==='VIP'||v==='Aktiv')cls='bo';
        else if(v==='Abgeschlossen'||v==='Normal'||v==='Optional')cls='bg';
        bdg='<span class="bdg '+cls+'">'+h(v)+'</span>';
        rows+='<div class="cf"><span class="cl">'+h(f.l)+'</span><span class="cv">'+bdg+'</span></div>';
      } else {
        var disp=fmt(v);
        if(disp.length>120)disp=disp.substring(0,120)+'...';
        rows+='<div class="cf"><span class="cl">'+h(f.l)+'</span><span class="cv">'+h(disp)+'</span></div>';
      }
    }
    out+='<div class="card"><div class="chd"><div class="ct">'+h(ct(name,x))+'</div><div class="ca"><button class="ib" data-a="ed" data-s="'+name+'" data-i="'+h(x.id)+'">&#9998;</button><button class="ib" data-a="dl" data-s="'+name+'" data-i="'+h(x.id)+'" style="color:#e74c3c">&#10005;</button></div></div>'+rows+'</div>';
  }
  if(!cnt)return '<div class="empty">Keine Eintr\u00E4ge vorhanden.<br><br><button class="abtn" data-a="add" data-s="'+name+'">+ Erster Eintrag</button></div>';
  return '<div class="grid">'+out+'</div>';
}

// ── NAVIGATION ──────────────────────────────────────────────
var LABELS={
  dashboard:'Dashboard',auftraege:'Auftr\u00E4ge',kunden:'Kunden',lieferanten:'Lieferanten',
  inventar:'Inventar',finanzen:'Finanzen & Konten',vertraege:'Vertr\u00E4ge',
  versicherungen:'Versicherungen',zugaenge:'Digitale Zug\u00E4nge',kontakte:'Wichtige Kontakte',
  rechtliches:'Rechtliches',wissen:'Wissen & Prozesse',notizen:'Notizen & Brief',einstellungen:'Einstellungen'
};

function go(name){
  cPage=name;
  var M=document.getElementById('main');
  // nav highlight
  var nbs=document.querySelectorAll('.nb');
  for(var i=0;i<nbs.length;i++){nbs[i].classList.remove('on');if(nbs[i].getAttribute('data-p')===name)nbs[i].classList.add('on')}
  var lbl=LABELS[name]||name;
  var ph='<div class="ph"><div class="pt">'+h(lbl)+'</div>'+(name!=='dashboard'&&name!=='einstellungen'?'<button class="abtn" data-a="add" data-s="'+name+'">+ Neuer Eintrag</button>':'')+'</div>';

  if(name==='dashboard'){
    var total=0;
    var secs=['auftraege','kunden','lieferanten','inventar','finanzen','vertraege','versicherungen','zugaenge','kontakte','rechtliches','wissen','notizen'];
    var stats='<div class="stats">';
    for(var i=0;i<secs.length;i++){var c=(db[secs[i]]||[]).length;total+=c;stats+='<div class="sc"><div class="sn">'+c+'</div><div class="sl">'+h(LABELS[secs[i]])+'</div></div>'}
    stats+='</div>';
    // offene Auftraege
    var au=db.auftraege||[];
    var offHtml='<div class="sec-lbl">Offene Auftr\u00E4ge</div>';
    var hasOff=false;
    for(var qi=0;qi<au.length;qi++){
      if(au[qi].status==='Offen'||au[qi].status==='In Arbeit'){
        hasOff=true;
        offHtml+='<div class="card" style="margin-bottom:8px"><div class="chd"><div class="ct">'+h(au[qi].titel||'')+'</div><button class="ib" data-a="ed" data-s="auftraege" data-i="'+h(au[qi].id)+'">&#9998;</button></div>';
        if(au[qi].kunde)offHtml+='<div class="cf"><span class="cl">Kunde</span><span class="cv">'+h(au[qi].kunde)+'</span></div>';
        if(au[qi].status)offHtml+='<div class="cf"><span class="cl">Status</span><span class="cv"><span class="bdg '+(au[qi].status==='Offen'?'br':'bo')+'">'+h(au[qi].status)+'</span></span></div>';
        if(au[qi].abgabe)offHtml+='<div class="cf"><span class="cl">Abgabe</span><span class="cv">'+h(fmt(au[qi].abgabe))+'</span></div>';
        if(au[qi].preis)offHtml+='<div class="cf"><span class="cl">Preis</span><span class="cv">'+h(au[qi].preis)+' EUR</span></div>';
        offHtml+='</div>';
      }
    }
    if(!hasOff)offHtml+='<div class="empty">Keine offenen Auftr\u00E4ge</div>';

    var s=db.settings||{};
    var welcomeName=s.inhaber?s.inhaber:(s.firma?s.firma:'');
    M.innerHTML=ph
      +'<div class="welcome"><h2>'+( welcomeName ? 'Betriebspass von '+h(welcomeName) : 'Willkommen beim Betriebspass' )+'</h2><p>Ihr digitales Betriebshandbuch &ndash; alle wichtigen Informationen f&uuml;r den Notfall strukturiert an einem Ort.<br>Insgesamt <strong>'+total+' Eintr&auml;ge</strong> erfasst.</p></div>'
      +stats+offHtml;
    return;
  }

  if(name==='einstellungen'){
    var s=db.settings||{};
    M.innerHTML=ph
      +'<div class="sf"><div style="font-size:11px;color:#1a3a5c;font-weight:700;letter-spacing:1px;margin-bottom:14px;text-transform:uppercase;">Betriebsdaten</div>'
      +'<div class="fr"><label class="fl">Firmenname / Betrieb</label><input type="text" id="s0" value="'+h(s.firma||'')+'"></div>'
      +'<div class="fr"><label class="fl">Inhaber</label><input type="text" id="s1" value="'+h(s.inhaber||'')+'"></div>'
      +'<div class="fr"><label class="fl">Branche</label><input type="text" id="s2" value="'+h(s.branche||'')+'"></div>'
      +'<div class="fr"><label class="fl">Adresse</label><textarea id="s3" rows="2">'+h(s.adresse||'')+'</textarea></div>'
      +'<div class="fr"><label class="fl">Telefon</label><input type="text" id="s4" value="'+h(s.telefon||'')+'"></div>'
      +'<div class="fr"><label class="fl">E-Mail</label><input type="text" id="s5" value="'+h(s.email||'')+'"></div>'
      +'<div class="fr"><label class="fl">Steuerberater Kontakt</label><input type="text" id="s6" value="'+h(s.stb||'')+'"></div>'
      +'<div class="fr"><label class="fl">Anwalt Kontakt</label><input type="text" id="s7" value="'+h(s.anwalt||'')+'"></div>'
      +'<div class="fr"><label class="fl">Anweisung an Hinterbliebene (Kurzfassung)</label><textarea id="s8" rows="4">'+h(s.anweisung||'')+'</textarea></div>'
      +'<button class="abtn" style="margin-top:8px" data-a="svs">Speichern</button></div>'
      +'<div class="sf" style="margin-top:14px;max-width:460px"><div style="font-size:11px;color:#1a3a5c;font-weight:700;letter-spacing:1px;margin-bottom:12px;text-transform:uppercase;">Zugangscode &auml;ndern</div>'
      +'<div class="fr"><label class="fl">Neuer Code</label><input type="password" id="pw1" placeholder="Neuer Zugangscode"></div>'
      +'<div class="fr"><label class="fl">Wiederholen</label><input type="password" id="pw2" placeholder="Code wiederholen"></div>'
      +'<button class="abtn" data-a="chpw">Code &auml;ndern</button></div>'
      +'<div class="dz" style="margin-top:14px;max-width:460px"><div class="dzt">&#9888; Gefahrenzone</div><p style="color:#999;font-size:12px;margin-bottom:10px;">Alle Daten unwiderruflich l&ouml;schen.</p><button class="tb" style="border-color:#c0392b;color:#c0392b" data-a="clr">Alle Daten l&ouml;schen</button></div>';
    return;
  }

  if(!F[name]){M.innerHTML='<p style="color:#999;padding:16px">Nicht gefunden.</p>';return;}
  var warn=name==='zugaenge'?'<div class="ntcr">&#128272; Sensible Daten &ndash; nur f&uuml;r Bevollm&auml;chtigte. Keine Klartextpassw&ouml;rter &ndash; Verweise auf Passwort-Manager verwenden.</div>':'';
  M.innerHTML=ph+warn+'<div class="sbar"><span class="sico">&#128269;</span><input type="text" id="sb" placeholder="Suchen..."></div><div id="cl">'+rCards(name,'')+'</div>';
}

// ── MODAL ──────────────────────────────────────────────
function oMod(s,id){
  var cfg=F[s];if(!cfg)return;
  cSec=s;eId=id||null;
  var x={};
  if(id){var a=db[s]||[];for(var i=0;i<a.length;i++){if(a[i].id===id){x=a[i];break}}}
  document.getElementById('mtitle').textContent=id?cfg.t+' bearbeiten':cfg.t+' erfassen';
  var o='';
  for(var i=0;i<cfg.f.length;i++){
    var f=cfg.f[i];var v=x[f.k]||'';var inp;
    if(f.tp==='ta')inp='<textarea id="fi'+i+'" rows="3">'+h(v)+'</textarea>';
    else if(f.tp==='sel'){var opts='<option value="">&ndash; w&auml;hlen &ndash;</option>';for(var j=0;j<f.o.length;j++)opts+='<option'+(f.o[j]===v?' selected':'')+'>'+h(f.o[j])+'</option>';inp='<select id="fi'+i+'">'+opts+'</select>';}
    else if(f.tp==='date')inp='<input type="date" id="fi'+i+'" value="'+h(v)+'">';
    else inp='<input type="text" id="fi'+i+'" value="'+h(v)+'" placeholder="'+h(f.l)+'">';
    o+='<div class="fr"><label class="fl">'+h(f.l)+(f.r?' <span style="color:#c0392b">*</span>':'')+'</label>'+inp+'</div>';
  }
  document.getElementById('mbody').innerHTML=o;
  document.getElementById('ov').classList.add('show');
}
function cMod(){document.getElementById('ov').classList.remove('show');cSec=null;eId=null;}
function sEnt(){
  if(!cSec)return;
  var cfg=F[cSec];
  var data={id:eId||String(Date.now()),_ts:new Date().toISOString()};
  var ok=true;
  for(var i=0;i<cfg.f.length;i++){
    var f=cfg.f[i];var el=document.getElementById('fi'+i);
    if(el){data[f.k]=el.value.trim();if(f.r&&!data[f.k]){el.style.borderColor='#c0392b';ok=false;}else el.style.borderColor='';}
  }
  if(!ok)return;
  if(!db[cSec])db[cSec]=[];
  if(eId){for(var i=0;i<db[cSec].length;i++){if(db[cSec][i].id===eId){db[cSec][i]=data;break;}}}
  else db[cSec].push(data);
  lsSave();cMod();go(cSec);
}
function dEnt(s,id){
  if(!confirm('Eintrag l\u00F6schen?'))return;
  var a=db[s]||[];var n=[];
  for(var i=0;i<a.length;i++){if(a[i].id!==id)n.push(a[i]);}
  db[s]=n;lsSave();go(s);
}
function svSet(){
  if(!db.settings)db.settings={};
  var ks=['firma','inhaber','branche','adresse','telefon','email','stb','anwalt','anweisung'];
  for(var i=0;i<ks.length;i++){var el=document.getElementById('s'+i);if(el)db.settings[ks[i]]=el.value;}
  lsSave();alert('Einstellungen gespeichert!');go('dashboard');
}

// ── EXPORT / IMPORT ──────────────────────────────────────────────
function expData(){
  var json=JSON.stringify(db,null,2);
  try{
    var b=new Blob([json],{type:'application/json'});
    var u=URL.createObjectURL(b);
    var a=document.createElement('a');
    a.href=u;a.download='betriebspass_'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(u);},1000);
  }catch(ex){prompt('JSON kopieren und als .json speichern:',json);}
}
function impData(ev){
  var f=ev.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(e){
    try{
      var imp=JSON.parse(e.target.result);
      if(confirm('Aktuelle Daten \u00FCberschreiben?')){
        for(var k in imp){if(Object.prototype.hasOwnProperty.call(imp,k))db[k]=imp[k];}
        lsSave();go('dashboard');alert('Import erfolgreich!');
      }
    }catch(err){alert('Fehler: '+err.message);}
  };
  r.readAsText(f);ev.target.value='';
}

// ── PASSWORD ──────────────────────────────────────────────
function checkPw(){
  var input=document.getElementById('pwInput');
  var stored=localStorage.getItem(PW_KEY)||DEFAULT_PW;
  if(input.value===stored){
    document.getElementById('pwscreen').style.display='none';
    document.getElementById('appWrap').style.display='block';
    lsLoad();go('dashboard');
  } else {
    document.getElementById('pwErr').style.display='block';
    input.value='';input.focus();
  }
}

// ── EVENTS ──────────────────────────────────────────────
document.getElementById('main').addEventListener('click',function(ev){
  var t=ev.target;
  while(t&&t!==this){
    var a=t.getAttribute('data-a');
    if(a){
      var s=t.getAttribute('data-s');var i=t.getAttribute('data-i');
      if(a==='ed')oMod(s,i);
      else if(a==='dl')dEnt(s,i);
      else if(a==='add')oMod(s||cPage,null);
      else if(a==='svs')svSet();
      else if(a==='chpw'){
        var p1=document.getElementById('pw1');var p2=document.getElementById('pw2');
        if(p1&&p2){
          if(p1.value.length<4){alert('Code muss mindestens 4 Zeichen haben.');}
          else if(p1.value!==p2.value){alert('Codes stimmen nicht \u00FCberein.');}
          else{localStorage.setItem(PW_KEY,p1.value);p1.value='';p2.value='';alert('Zugangscode ge\u00E4ndert!');}
        }
      }
      else if(a==='clr'){
        if(confirm('Wirklich alle Daten l\u00F6schen?')){
          db={settings:{},auftraege:[],kunden:[],lieferanten:[],inventar:[],finanzen:[],vertraege:[],versicherungen:[],zugaenge:[],kontakte:[],rechtliches:[],wissen:[],notizen:[]};
          lsSave();go('dashboard');
        }
      }
      return;
    }
    t=t.parentNode;
  }
});
document.getElementById('main').addEventListener('input',function(ev){
  if(ev.target&&ev.target.id==='sb'){var cl=document.getElementById('cl');if(cl)cl.innerHTML=rCards(cPage,ev.target.value);}
});
document.getElementById('ov').addEventListener('click',function(ev){if(ev.target===this)cMod();});
document.getElementById('nav').addEventListener('click',function(ev){
  var t=ev.target;
  while(t&&t!==this){var p=t.getAttribute('data-p');if(p){go(p);return;}t=t.parentNode;}
});
document.getElementById('bNew').addEventListener('click',function(){
  var s=cPage;
  if(s==='dashboard'||s==='einstellungen')s='notizen';
  oMod(s,null);
});
document.getElementById('bExp').addEventListener('click',expData);
document.getElementById('bFile').addEventListener('change',impData);
document.getElementById('bPrint').addEventListener('click',function(){window.print();});
document.getElementById('bSav').addEventListener('click',sEnt);
document.getElementById('bCan').addEventListener('click',cMod);

lsLoad();
</script>
